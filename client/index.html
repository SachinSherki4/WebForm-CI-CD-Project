<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Information Form - Collection App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="form-wrapper">
      <div class="header">
        <h1>User Information Form</h1>
        <p class="subtitle">Please fill in all the required information below</p>
      </div>

      <!-- Success Message -->
      <div id="successMessage" class="alert alert-success" style="display: none;">
        <strong>Success!</strong> Your information has been submitted successfully.
      </div>

      <!-- Error Message -->
      <div id="errorMessage" class="alert alert-error" style="display: none;">
        <strong>Error!</strong> Please fix the errors below.
      </div>

      <!-- Form -->
      <form id="userForm" class="form">
        <!-- Full Name -->
        <div class="form-group">
          <label for="fullName" class="required">Full Name</label>
          <input 
            type="text" 
            id="fullName" 
            name="fullName" 
            placeholder="John Doe" 
            required
          >
          <span class="error-text" id="error-fullName"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email" class="required">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="john@example.com" 
            required
          >
          <span class="error-text" id="error-email"></span>
        </div>

        <!-- Phone Number -->
        <div class="form-group">
          <label for="phone" class="required">Phone Number</label>
          <input 
            type="tel" 
            id="phone" 
            name="phone" 
            placeholder="(123) 456-7890" 
            required
          >
          <span class="error-text" id="error-phone"></span>
        </div>

        <!-- Address -->
        <div class="form-group">
          <label for="address" class="required">Street Address</label>
          <input 
            type="text" 
            id="address" 
            name="address" 
            placeholder="123 Main Street" 
            required
          >
          <span class="error-text" id="error-address"></span>
        </div>

        <!-- City -->
        <div class="form-row">
          <div class="form-group">
            <label for="city" class="required">City</label>
            <input 
              type="text" 
              id="city" 
              name="city" 
              placeholder="New York" 
              required
            >
            <span class="error-text" id="error-city"></span>
          </div>

          <!-- State -->
          <div class="form-group">
            <label for="state" class="required">State/Province</label>
            <input 
              type="text" 
              id="state" 
              name="state" 
              placeholder="NY" 
              required
            >
            <span class="error-text" id="error-state"></span>
          </div>
        </div>

        <!-- Country -->
        <div class="form-row">
          <div class="form-group">
            <label for="country" class="required">Country</label>
            <input 
              type="text" 
              id="country" 
              name="country" 
              placeholder="United States" 
              required
            >
            <span class="error-text" id="error-country"></span>
          </div>

          <!-- Zip Code -->
          <div class="form-group">
            <label for="zipCode" class="required">Zip Code</label>
            <input 
              type="text" 
              id="zipCode" 
              name="zipCode" 
              placeholder="10001" 
              required
            >
            <span class="error-text" id="error-zipCode"></span>
          </div>
        </div>

        <!-- Additional Notes -->
        <div class="form-group">
          <label for="notes">Additional Notes</label>
          <textarea 
            id="notes" 
            name="notes" 
            placeholder="Any additional information you'd like to share (optional)"
            rows="4"
          ></textarea>
          <span class="error-text" id="error-notes"></span>
        </div>

        <!-- Submit Button -->
        <button type="submit" id="submitBtn" class="btn btn-primary">
          <span class="btn-text">Submit Form</span>
          <span class="btn-loading" style="display: none;">
            <span class="spinner"></span> Submitting...
          </span>
        </button>
      </form>

      <!-- View Submissions Link -->
      <div class="form-footer">
        <button type="button" id="viewBtn" class="btn btn-secondary">
          View All Submissions
        </button>
      </div>
    </div>

    <!-- Submissions Modal -->
    <div id="submissionsModal" class="modal" style="display: none;">
      <div class="modal-content">
        <div class="modal-header">
          <h2>All Submissions</h2>
          <button type="button" class="modal-close" id="closeModal">&times;</button>
        </div>
        <div class="modal-body">
          <div id="submissionsList" class="submissions-list"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
