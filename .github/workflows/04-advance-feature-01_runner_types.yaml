name: Runner Types

on: 
  workflow_dispatch: 

jobs:
  # Github Microsoft Hosted Runners

  github-hosted-runner-ubuntu-vm:
    name: GitHub-hosted Runner - Ubuntu VM
    runs-on: ubuntu-24.04   
    steps:
      - name: Show runner info
        run: |
          echo "This job runs on a GitHub-hosted Ubuntu runner."
          echo "Hello from ${{runner.os}} - ${{runner.arch}}"
          echo "Runner name: ${{runner.name}}"
          echo "Runner workspace: ${{runner.workspace}}"
          

  github-hosted-runner-windows-vm:
    name: GitHub-hosted Runner - Windows VM
    runs-on: windows-2022
    steps:  
      - name: Show runner info
        shell: pwsh
        run: |
          echo "This job runs on a GitHub-hosted Windows runner."
          echo "Hello from ${{runner.os}} - ${{runner.arch}}"
          echo "Runner name: ${{runner.name}}"
          echo "Runner workspace: ${{runner.workspace}}"
  
  github-hosted-runner-macos-vm:
    name: GitHub-hosted Runner - macOS VM
    runs-on: macos-14
    steps:
      - name: Show runner info
        run: |
          echo "This job runs on a GitHub-hosted macos-vm runner."
          echo "Hello from ${{runner.os}} - ${{runner.arch}}"
          echo "Runner name: ${{runner.name}}"
          echo "Runner workspace: ${{runner.workspace}}"

  alpine-container-github-hosted-runner-ubuntu-container:
    name: Alpine Container - GitHub-hosted Runner - Ubuntu Container
    runs-on: ubuntu-24.04
    container:
      image: alpine:latest
    steps:
      - name: Show runner info
        run: |
          echo "This job runs on a GitHub-hosted macos-vm runner."
          echo "Hello from ${{runner.os}} - ${{runner.arch}}"
          echo "Runner name: ${{runner.name}}"
          echo "Runner workspace: ${{runner.workspace}}"
          echo "container info: $(cat /etc/os-release)"
          echo "container Image: $(grep PRETTY_NAME /etc/os-release)"


  # Self-hosted Runners
  self-hosted-runner:
    name: Self-hosted Runner
    runs-on: self-hosted
    steps:
      - name: Show runner info
        run: |
          echo "This job runs on a self-hosted runner."
          echo "Hello from ${{runner.os}} - ${{runner.arch}}"
          echo "Runner name: ${{runner.name}}"
          echo "Runner workspace: ${{runner.workspace}}"
  
  # Self-hosted Runners in a container
  alpine-container-self-hosted-runner:  
    name: Alpine Container - Self-hosted Runner
    runs-on: self-hosted
    container:
      image: alpine:latest
    steps:
      - name: Show runner info
        run: |
          echo "This job runs on a self-hosted runner within an alpine container."
          echo "Hello from ${{runner.os}} - ${{runner.arch}}"
          echo "Runner name: ${{runner.name}}"
          echo "Runner workspace: ${{runner.workspace}}"
          echo "container info: $(cat /etc/os-release)"
          echo "container Image: $(grep PRETTY_NAME /etc/os-release)"