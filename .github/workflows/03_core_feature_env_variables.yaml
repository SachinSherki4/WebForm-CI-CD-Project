name: Environment Variables

on: 
  workflow_dispatch:  # this will allow manual triggering of the workflow from the GitHub UI, which is useful for testing and demonstration purposes.

env:
  GLOBAL_VAR: I_AM_GLOBAL_VAR

jobs:
  job-1:
    runs-on: ubuntu-24.04
    env:
      JOB_VAR: I_AM_JOB_VAR
    steps:  
      - name: Step with step-specific environment variable
        env:
          STEP_VAR: I_AM_STEP_VAR
        run: |
          echo "Accessing environment variables in Job 1"
          echo "Global variable:  $GLOBAL_VAR"  # visible
          echo "Job variable:     $JOB_VAR"     # visible 
          echo "Step variable:    $STEP_VAR"    # visible only here
      
      - name: Step without step-specific environment variable
        run: |
          echo "Accessing environment variables in Job 1"
          echo "Global variable:  $GLOBAL_VAR"  # visible
          echo "Job variable:     $JOB_VAR"     # visible
          echo "Step variable:    ${STEP_VAR:-<UNSET>}"  # This will be empty since STEP_VAR is not defined for this step

  job-2:
    runs-on: ubuntu-24.04
    steps:
      - name: Step in Job 2
        run: |
          echo "Accessing environment variables in Job 2"
          echo "Global variable:  $GLOBAL_VAR"  # visible
          echo "Job variable:     ${JOB_VAR:-<UNSET>}"     # This will be empty since JOB_VAR is not defined for this job
          echo "Step variable:    ${STEP_VAR:-<UNSET>}"    # This will be empty since STEP_VAR is not defined for this step